<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Document</title>

  <style>
    #container {
      width: 400px;
      height: 550px;
      border: 1px solid black;
      border-radius: 20px;
      box-sizing: border-box;
      box-shadow: 2px 2px 5px gray;
      margin:10vw;
      display: flex;
      flex-direction: column;
    }

    .img-container {
      position: relative;
    }
    .details {
      margin: 10px;
    }
    h3 {
      text-transform: uppercase;
      color: rgb(red, green, blue);

    }
    p{
      font-size: 14px;
      color: rgb(48, 40, 131);
      line-height: 1.5;
      font-family: bold italic 16px/1.5 "Times New Roman", serif;
    }
    h4 {
      color: green;
    } 

    .like-box {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 5px;
      border-radius: 50%;
    }

    img {
      width: 100%;
      height: auto;
    }
  </style>
</head>

<body>

  <article id="container">

    <section class="img-container">

      <div class="like-box">❤️</div>

      <img
        src="https://m.media-amazon.com/images/I/61b0760Of8L._AC_UY1000_.jpg"
        alt="product image"
      />

    </section>

    <section class="details">
      <h3>Nike Air Max</h3>
      <h4>$99.99</h4>
      <p>Stylish White Casual Sneaker Shoes for Men Attractive Sneakers Outdoor Shoes Casual Sneakers Black Outdoor Lightweight Lace-Up Shoes for Boys and Men</p>
    </section>

  </article>

</body>
</html>
