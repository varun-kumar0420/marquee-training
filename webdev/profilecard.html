<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      />
      <style>
        *{
            margin : 0;
            padding : 0;
            border : border-box;
            color : rgb(51, 49, 49);
            font-family: Calibri;
        }

        #container{
            background-color: rgb(249, 246, 246);
            width : 25vw;
            height : 65vh;
            margin : 3rem 4rem;;
            box-shadow : -3px -3px 3px white, 3px 3px 3px gray;
            display : flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            gap : 1.5rem;
        }

        .top-bar{
            display: flex;
            justify-content: space-between;
            width : 90%;
        }
        
        .profile-section{
            display: flex;
            flex-direction: column;
            align-items: center;
            gap : 0.3rem;
        }

        .img-container {
            width : 140px;
            height : 140px;
            border-radius: 50%;
            box-shadow : -3px -3px 3px white, 3px 3px 3px gray;
            display : flex;
            justify-content: center;
            align-items: center;
        }

        img{
            width : 120px;
            height : 120px;
            object-fit : cover;
            border-radius: 50%;
        }

        #name{
            color : black;
            font-weight: 600;
            font-size : 1.3rem;
        }

        #social-media{
            display: flex;
            justify-content: center;
            gap : 0.9rem;
        }

        .social{
            height : 35px;
            width : 35px;
            border-radius: 50%;
            box-shadow : -3px -3px 3px white, 3px 3px 3px gray;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #msg-sub{
            display: flex;
            justify-content: space-evenly;
            width : 100%;
        }

        .button{
            width : 120px;
            height : 30px;
            border-radius: 5px;
            box-shadow : -3px -3px 3px white, 3px 3px 3px gray;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #like-comment-share{
            display: flex;
            width : 100%;
            justify-content: space-evenly;
        }

        .stats{
            width : 90px;
            height : 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow : -3px -3px 5px white, 2px 2px 10px rgb(220, 216, 216);
        }
      </style>
</head>
<body>
    <article id="container">

        <section class="top-bar">
            <i class="fa-solid fa-arrow-left"></i>
            <i class="fa-solid fa-ellipsis-vertical"></i>
        </section>

        <section class="profile-section">
            <section class="img-container">
                <img src="https://img.magnific.com/premium-photo/profile-icon-white-background_941097-162014.jpg"alt="">
            </section>
            <p id="name">VARUN KUMAR</p>
            <p>Developer & Designer</p>
        </section>

        <section id="social-media">
            <div class="social"><i class="fa-brands fa-facebook-f" style="color:rgb(26, 26, 72)"></i></div>
            <div class="social"><i class="fa-brands fa-twitter" style="color:rgb(12, 123, 243)"></i></div>
            <div class="social"><i class="fa-brands fa-instagram" style="color:rgb(241, 15, 154)"></i></div>
            <div class="social"><i class="fa-brands fa-youtube" style="color:rgb(237, 12, 12)"></i></div>
        </section>

        <section id="msg-sub">
            <div class="button">
                <div>Message</div>
            </div>
            <div class="button">
                <div>Subscribe</div>
            </div>
        </section>

        <section id="like-comment-share">
            <div class="stats"><i class="fa-regular fa-heart"></i>20.4M</div>
            <div class="stats"><i class="fa-regular fa-comment"></i>14.3M</div>
            <div class="stats"><i class="fa-solid fa-share"></i>12.8M</div>
        </section>
    </article>
</body>
</html>
