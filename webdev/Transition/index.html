<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Document</title>
    <style>
      #box1{
        height: 100px;
        width: 100px;
        background-color: yellow;
        animation-name: pop-in-out;
        animation-duration: 1.5s;
        animation-iteration-count: infinite;
      }
      @keyframes pop-in-out {
        0%{
          background-color: white;
          margin-left: 0;
          border-radius: 10px;
        }
        /* to{
          background-color: skyblue;
          margin-left: 100px;
          margin-top: 150px;
          margin-bottom: 150px;

        } */
         25%{
          background-color: hotpink;
          margin-left: 150px;
          margin-top: 0;
          border-radius: 20px;
         }
         75%{
          background-color: skyblue;
          margin-left: 150px;
          margin-top: 200px;
          border-radius: 40px;
         }
         100%{
          background-color: rgb(231, 9, 176);
          margin-left: 0;
          margin-top: 200px;
          border-radius: 50px;
         }
      }
      #box{
        width: 200px;
        height: 50px;
        border-radius: 20px;
        background-color: red;
        transition-property: all;
        transition-duration: 2s;
        transition-delay: 1s;
        border: 2px solid blue;
      }
      #box:hover{
        background-color: yellow;
        width: 150px;
        border: 5px solid black;
      }
      button{
        color: wheat;
        background-color: blue;
        outline: none;
        border: none;
        border-radius: 20px;
        transition-property: all;
        transition-duration: 2s;
      }
      button:hover{
        background-color: rgb(250, 180, 100);
        scale: 1.1;
      }
    </style>
  </head>
  <body>
    <div id="box">Transition</div>
    <div id="box1">Animation</div>
    <button type="">Click</button>
  </body>
</html>
